version: '3'
services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
  web:
    build: .
    command: /bin/sh -c "rm -f tmp/pids/server.pid && bin/dev"
    env_file:
      - ./.env
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: password
      REDIS_URL: redis://redis:6379/1
    volumes:
      - .:/tt_log
      - bundle:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
volumes:
  bundle:
